    description: npm run build가 성공해야 한다

  - id: NFR-002
    title: 콘솔 에러 없음
    severity: hard
    test_method: console_check
    description: 치명적 콘솔 에러가 없어야 한다

  - id: NFR-003
    title: 모든 페이지 접근 가능
    severity: hard
    test_method: e2e
